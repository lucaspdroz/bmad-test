<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>ztalk</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="high-contrast">
  <ion-header collapse="condense">
    <ion-toolbar color="primary">
      <ion-title size="large">ztalk</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="page-content">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Current Folder</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label position="stacked">Folder name</ion-label>
          <ion-input [(ngModel)]="newFolderName" placeholder="New folder name" autocomplete="off"></ion-input>
        </ion-item>
        <ion-button expand="block" size="large" (click)="addFolder()" [disabled]="!newFolderName.trim()">Add folder</ion-button>

        <ion-list>
          <ion-list-header>Folders</ion-list-header>
          <ion-reorder-group disabled="false" (ionItemReorder)="reorderFolders($event)">
            <ion-item *ngFor="let folder of folders" [class.selected]="folder.id === selectedFolderId" lines="full">
              <ion-label>{{ folder.name }} ({{ folder.cards.length }})</ion-label>
              <ion-button fill="outline" color="medium" size="small" (click)="selectFolder(folder.id)">Open</ion-button>
              <ion-button fill="outline" color="warning" size="small" (click)="promptRenameFolder(folder)">Rename</ion-button>
              <ion-button fill="outline" color="danger" size="small" (click)="deleteFolder(folder.id)">Delete</ion-button>
              <ion-reorder slot="end"></ion-reorder>
            </ion-item>
          </ion-reorder-group>
        </ion-list>
      </ion-card-content>
    </ion-card>

    <ion-card *ngIf="selectedFolder">
      <ion-card-header>
        <ion-card-title>Cards in {{ selectedFolder.name }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label position="stacked">New card text</ion-label>
          <ion-textarea [(ngModel)]="newCardText" placeholder="Type a phrase and tap Add" rows="3"></ion-textarea>
        </ion-item>
        <ion-button expand="block" size="large" (click)="addCard()" [disabled]="!newCardText.trim()">Add card</ion-button>

        <ion-list>
          <ion-list-header>Cards</ion-list-header>
          <ion-reorder-group disabled="false" (ionItemReorder)="reorderCards($event)">
            <ion-item *ngFor="let card of selectedFolder.cards" lines="full" class="card-item">
              <ion-label>{{ card.text }}</ion-label>
              <ion-button fill="outline" color="success" size="small" (click)="speakCard(card)">Speak</ion-button>
              <ion-button fill="outline" color="primary" size="small" (click)="editCard(card)">Edit</ion-button>
              <ion-button fill="outline" color="danger" size="small" (click)="deleteCard(card.id)">Delete</ion-button>
              <ion-select [value]="selectedFolderId" (ionChange)="moveCard(card.id, $event.detail.value)">
                <ion-select-option *ngFor="let folder of folders" [value]="folder.id">{{ folder.name }}</ion-select-option>
              </ion-select>
              <ion-reorder slot="end"></ion-reorder>
            </ion-item>
          </ion-reorder-group>
        </ion-list>
      </ion-card-content>
    </ion-card>

    <ion-card *ngIf="!selectedFolder">
      <ion-card-content>
        Select or create a folder to manage cards.
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
